server:
  port: 8080
  timeout_seconds: 5

database:
  dsn: "host=postgres port=5432 user=agent password=agent dbname=agentdb sslmode=disable"
  max_open_conns: 20
  max_idle_conns: 5

redis:
  addr: "redis:6379"
  password: ""
  db: 0
  pool_size: 10

llm:
  provider: "deepseek"          # deepseek | qwen | gemini
  api_key: "YOUR_API_KEY_HERE"
  api_url: "https://api.deepseek.com/v1/chat/completions"
  model: "deepseek-chat"
  timeout_seconds: 3
  embedding_url: "https://api.deepseek.com/v1/embeddings"
  embedding_model: "deepseek-embedding"
  embedding_dim: 1024

cache:
  ttl_seconds: 7200    # 2 hours

ratelimit:
  requests_per_minute: 10

wechat:
  app_id: "YOUR_WECHAT_APP_ID"
  app_secret: "YOUR_WECHAT_APP_SECRET"
  subscribe_template_id: "YOUR_TEMPLATE_ID"

cron:
  match_interval_minutes: 10
  match_similarity_threshold: 0.75

agent:
  max_react_steps: 6           # ReAct loop max iterations before giving up
  memory_top_k: 5              # number of memories injected per request
